name: Lint pushes/PRs
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:

      - name: Checkout repository code
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
