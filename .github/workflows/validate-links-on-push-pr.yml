name: Validate links on push + PR

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linkinator:
    #if: ${{ github.event.head_commit.author.name != 'kudo-sync-bot' }} # skip auto bump commits containing future links
    if: false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: JustinBeckwith/linkinator-action@7b6b0bc671f6264e1a8daa4488a5bd91ce61dcd4 # v2.4.2
        with:
          paths: '**/*.md'
          statusCodes: '{ "429": "skip", "502": "skip", "999": "skip" }'
          linksToSkip: 'npmjs\.com|(?:LICENSE\.md|transparent)$'
