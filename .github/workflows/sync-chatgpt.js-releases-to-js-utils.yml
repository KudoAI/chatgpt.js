name: Sync releases to adamlui/js-utils

on:
  release:
    types: [published, edited]

jobs:
  sync-release:
    name: Sync release to adamlui/js-utils
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - id: krb-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.KRB_APP_ID }}
          private-key: ${{ secrets.KRB_PRIVATE_KEY }}
          owner: adamlui
      - run: |
          RELEASE_TITLE="${{ github.event.release.name }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "Source Title: $RELEASE_TITLE"
          echo "Source Tag: $RELEASE_TAG"

          TARGET_REPO="adamlui/js-utils"
          RELEASE_JSON=$(curl -s "https://api.github.com/repos/KudoAI/chatgpt.js/releases/tags/$RELEASE_TAG")
          RELEASE_NOTES=$(echo "$RELEASE_JSON" | sed -nE 's/.*"body": "(.*)".*/\1/p')

          if [[ "$RELEASE_NOTES" == *"Auto-synced from"* ]] ; then
            echo "Release already auto-synced. Exiting..." ; exit 0 ; fi

          # Convert emoji
          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | \
            sed 's|📃|:page_with_curl:|g; s|🚀|:rocket:|g; s|🧠|:brain:|g; s|💻|:computer:|g')

          TARGET_RELEASE_TITLE=$RELEASE_TITLE
          TARGET_RELEASE_TAG="chatgpt.js-$(echo "$RELEASE_TAG" | sed -E 's/^v(.*)$/\1/')"
          echo "Target Title: $TARGET_RELEASE_TITLE"
          echo "Target Tag: $TARGET_RELEASE_TAG"

          # Check release exists in adamlui/js-utils
          RELEASE_CHECK_RESP=$(curl -s \
            "https://api.github.com/repos/$TARGET_REPO/releases/tags/$TARGET_RELEASE_TAG")
          TARGET_RELEASE_ID=$(echo "$RELEASE_CHECK_RESP" | sed -nE 's/.*"id":[[:space:]]*([0-9]+).*/\1/p' | head -1)
          if [ -n "$TARGET_RELEASE_ID" ] ; then
            RELEASE_EXISTS=true
            echo "Release exists (ID: $TARGET_RELEASE_ID)"
          else
            RELEASE_EXISTS=false
            echo "Release does not exist"
          fi

          # Append auto-sync trailer
          RELEASE_NOTES+="\n\n###### _Auto-synced from https://github.com/KudoAI/chatgpt.js/releases"
          RELEASE_NOTES+=" by [@kudo-sync-bot](https://github.com/kudo-sync-bot)_"

          # Export token for gh CLI
          export GH_TOKEN="${{ steps.krb-token.outputs.token }}"

          if [ "$RELEASE_EXISTS" = false ] ; then
            echo "Creating new release..."
            if [[ "${{ github.event.action }}" == "published" ]] && [ "$(ls -A assets 2>/dev/null)" ] ; then
              gh release create "$TARGET_RELEASE_TAG" \
                --repo "$TARGET_REPO" \
                --title "$TARGET_RELEASE_TITLE" \
                --notes "$RELEASE_NOTES" \
                assets/*
            else
              gh release create "$TARGET_RELEASE_TAG" \
                --repo "$TARGET_REPO" \
                --title "$TARGET_RELEASE_TITLE" \
                --notes "$RELEASE_NOTES"
            fi
          else
            echo "Updating existing release..."
            gh release edit "$TARGET_RELEASE_TAG" \
              --repo "$TARGET_REPO" \
              --title "$TARGET_RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          fi

          echo "Release synced to $TARGET_REPO ($TARGET_RELEASE_TAG)!"
