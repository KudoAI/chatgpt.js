name: Update jsDelivr hits badge

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

jobs:
  update-badge:
    if: github.repository == 'KudoAI/chatgpt.js'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      TZ: PST8PDT

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          path: KudoAI/chatgpt.js

      - run: |
          cd "${{ github.workspace }}/KudoAI/chatgpt.js"

          fetch_total() {
            curl -fsSL "$1" | sed -n -E 's/.*"total":[[:space:]]*([0-9]+).*/\1/p' | head -1
          }

          format_total() {
            echo "$1" | sed ':a;s/\B[0-9]\{3\}\>/,&/;ta'
          }

          npm_hits=$(fetch_total "https://data.jsdelivr.com/v1/stats/packages/npm/@kudoai/chatgpt.js?period=year")
          gh_hits=$(fetch_total "https://data.jsdelivr.com/v1/stats/packages/gh/KudoAI/chatgpt.js?period=year")

          if [ -z "$npm_hits" ] || [ -z "$gh_hits" ] ; then
            echo "Error getting jsDelivr hits"
            exit 1
          fi

          total_hits=$((npm_hits + gh_hits))
          formatted_total=$(format_total "$total_hits")
          echo "Combined jsDelivr hits: $formatted_total ($npm_hits npm + $gh_hits gh)"

          for readme in README.md docs/README.md ; do
            sed -i -E "s|(badge/jsDelivr_Requests-)[0-9.,kmK+mM]+(-2bbbd8\.svg)|\1$formatted_total\2|Ig" "$readme"
          done

          if git diff --quiet -- README.md docs/README.md ; then
            echo "jsDelivr hits badge already current."
          else
            echo "JSD_BADGE_UPDATED=true" >> $GITHUB_ENV
          fi

      - if: env.JSD_BADGE_UPDATED == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_ID: ${{ secrets.GPG_PRIVATE_ID }}
        run: |
          gpg --batch --import <(echo "$GPG_PRIVATE_KEY")
          git config --global commit.gpgsign true
          git config --global user.name "kudo-sync-bot"
          git config --global user.email "auto-sync@kudoai.com"
          git config --global user.signingkey "$GPG_PRIVATE_ID"

      - if: env.JSD_BADGE_UPDATED == 'true'
        run: |
          cd "${{ github.workspace }}/KudoAI/chatgpt.js"
          git add README.md docs/README.md
          git commit -n -m "Updated jsDelivr shield counter [auto-sync]"
          git pull --rebase
          git push
