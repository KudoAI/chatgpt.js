name: Publish to npm on new release tag

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm ci && npm publish --provenance
